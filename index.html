<!DOCTYPE html>
<html lang="nl">

  <style>

  </style>
</head>

      <p class="text-sm">© 2026 VerdeHome. Alle rechten voorbehouden.</p>
      <div class="flex items-center gap-2 bg-gray-900 px-4 py-2 rounded-full border border-gray-800">
